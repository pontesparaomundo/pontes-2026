<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planilha Mestre - Pontes 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="flex h-screen overflow-hidden text-gray-800" data-active-page="planilha">
    <div id="mobile-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden md:hidden" onclick="toggleMenu()"></div>
    <div id="sidebar-container" class="flex"></div>

    <main class="flex-1 flex flex-col h-full overflow-y-auto no-scrollbar relative">
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center z-10 sticky top-0">
            <div class="flex items-center">
                <button onclick="toggleMenu()" class="mr-4 md:hidden text-gray-600 hover:text-[#075985]" aria-label="Abrir menu">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div>
                    <h2 class="text-xl md:text-2xl font-semibold text-gray-800 tracking-tight">Planilha Mestre</h2>
                </div>
            </div>
            <div class="text-right">
                <p class="text-sm font-medium text-gray-600" id="current-date">Carregando...</p>
            </div>
        </header>

        <div class="page-section p-4 md:p-8 max-w-7xl mx-auto w-full">
            <div class="glass-card p-4 md:p-6">
                <h3 class="font-semibold text-gray-800 mb-4 border-b pb-2">Relatório de Visualização</h3>
                <div class="w-full h-[75vh] rounded-lg overflow-hidden border border-gray-200 bg-[#F8FAFC]">
                    <iframe
                        src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSIEnoiXwhrILv-Tp5_EaMraCnOCSM0WDV47tmFeeq90ilmPMTi9bN9-bc9SF0NGg/pubhtml?gid=48735881&single=true"
                        class="w-full h-full border-0"
                        title="Planilha Mestre - Relatório"
                        loading="lazy">
                    </iframe>
                </div>
            </div>
        </div>
    </main>

    <script src="js/shared.js"></script>
</body>
</html>
